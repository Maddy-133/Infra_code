trigger: none

pool:
  name: 'DevOps Insider ka shair'

steps:
- task: TerraformInstaller@1
  inputs:
    terraformVersion: 'latest'

- task: TerraformTask@5
  displayName: 'Terraform Init'
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: '$(System.DefaultWorkingDirectory)/Terraform code'
    backendServiceArm: 'mehdiwif'
    backendAzureRmResourceGroupName: 'mehdi_rg'
    backendAzureRmStorageAccountName: 'mehdihyd1996'
    backendAzureRmContainerName: 'mehdicontainer'
    backendAzureRmKey: 'terraform.tfstate'

- task: TerraformTask@5
  displayName: 'Terraform Plan'
  inputs:
    provider: 'azurerm'
    command: 'plan'
    workingDirectory: '$(System.DefaultWorkingDirectory)/Terraform code'
    environmentServiceNameAzureRM: 'mehdiwif'

- task: TerraformTask@5
  displayName: 'Terraform Apply with auto approve'
  inputs:
    provider: 'azurerm'
    command: 'apply'
    commandOptions: '-auto-approve'
    workingDirectory: '$(System.DefaultWorkingDirectory)/Terraform code'
    environmentServiceNameAzureRM: 'mehdiwif'


